<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0b0b0b" />
  <title>David Jácome | Integral360</title>

  <style>
    :root {
      --bg: #070707;
      --gold: #d4af37;
      --text: #f5f5f5;
      --muted: #b7b7b7;
    }

    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif;
      background: linear-gradient(180deg, #0a0a0a, #050505);
      color: var(--text);
      display: flex;
      justify-content: center;
      padding: 20px;
    }

    .container {
      max-width: 420px;
      width: 100%;
    }

    .card {
      background: rgba(255,255,255,0.03);
      border-radius: 28px;
      padding: 20px;
      text-align: center;
    }

    .logo img {
      width: 120px;
    }

    .photo {
      width: 130px;
      height: 130px;
      border-radius: 50%;
      margin: 15px auto;
      border: 3px solid var(--gold);
      object-fit: cover;
    }

    h1 {
      margin: 5px 0;
      font-size: 1.6rem;
    }

    .role {
      color: var(--gold);
      font-weight: 600;
    }

    .btn-main {
      display: block;
      margin-top: 15px;
      padding: 15px;
      background: var(--gold);
      color: #000;
      border-radius: 14px;
      font-weight: bold;
      text-decoration: none;
    }

    .actions {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin-top: 15px;
    }

    .action {
      padding: 12px;
      background: rgba(255,255,255,0.05);
      border-radius: 14px;
      text-decoration: none;
      color: white;
      font-size: 0.85rem;
    }

    .section {
      margin-top: 20px;
      text-align: left;
    }

    .section h2 {
      font-size: 0.8rem;
      color: var(--gold);
      text-transform: uppercase;
    }

    .bio {
      font-size: 0.9rem;
      color: #ddd;
      text-align: center;
    }

    .services {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .service {
      background: rgba(255,255,255,0.05);
      padding: 10px;
      border-radius: 12px;
      font-size: 0.8rem;
    }
  </style>
</head>

<body>
  <div class="container">
    <div class="card">

      <div class="logo">
        <img src="logo.png">
      </div>

      <img class="photo" src="foto.jpeg">

      <h1>David Jácome</h1>
      <div class="role">Gerente de Ingeniería</div>

      <a class="btn-main" href="contacto.vcf" download>
        Guardar contacto
      </a>

      <div class="actions">
        <a class="action" href="https://wa.me/573143994146">WhatsApp</a>
        <a class="action" href="tel:+573143994146">Llamar</a>
        <a class="action" href="mailto:info@integral360.com.co">Email</a>
      </div>

      <div class="section">
        <h2>Perfil</h2>
        <p class="bio">
          Lidero procesos de ingeniería y transformación tecnológica,
          integrando soluciones empresariales modernas y eficientes.
        </p>
      </div>

      <div class="section">
        <h2>Servicios</h2>
        <div class="services">
          <div class="service">Ingeniería</div>
          <div class="service">Transformación digital</div>
          <div class="service">Consultoría</div>
          <div class="service">Soporte</div>
        </div>
      </div>

    </div>
  </div>
</body>
</html>
