<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Integral360</title>

<style>
body{
  margin:0;
  font-family: Arial, sans-serif;
  background:#0b0b0b;
  color:#fff;
  text-align:center;
}

/* CONTENEDOR */
.container{
  max-width:420px;
  margin:auto;
  padding:20px;
  animation:fadeIn 0.8s ease;
}

/* ANIMACIÓN */
@keyframes fadeIn{
  from{opacity:0; transform:translateY(20px);}
  to{opacity:1; transform:translateY(0);}
}

/* LOGO */
.logo-img{
  width:160px;
  margin:30px auto 5px;
  display:block;
  opacity:0;
  animation:fadeIn 1s ease forwards;
}

/* FOTO PRO (AJUSTADA) */
.foto{
  width:170px;
  height:170px;
  border-radius:50%;
  object-fit:cover;

  /* 🔥 ENCUADRE CORREGIDO */
  object-position: center 20%;

  border:4px solid #d4af37;
  margin:15px auto;
  display:block;
  box-shadow:0 0 25px rgba(212,175,55,0.5);
  opacity:0;
  animation:fadeIn 1s ease 0.2s forwards;
}

/* NOMBRE */
.name{
  font-size:24px;
  font-weight:bold;
  margin-top:10px;
  opacity:0;
  animation:fadeIn 1s ease 0.3s forwards;
}

.role{
  color:#d4af37;
  margin-bottom:25px;
  font-size:16px;
  opacity:0;
  animation:fadeIn 1s ease 0.4s forwards;
}

/* BOTONES */
.btn{
  display:flex;
  align-items:center;
  justify-content:center;
  gap:10px;
  background:linear-gradient(145deg,#1c1c1c,#121212);
  color:white;
  text-decoration:none;
  padding:16px;
  margin:12px 0;
  border-radius:16px;
  border:1px solid #2a2a2a;
  font-weight:bold;
  font-size:16px;
  box-shadow:0 5px 15px rgba(0,0,0,0.4);
  transition:0.2s;
  opacity:0;
  animation:fadeIn 1s ease forwards;
}

.btn:nth-of-type(1){animation-delay:0.5s;}
.btn:nth-of-type(2){animation-delay:0.6s;}
.btn:nth-of-type(3){animation-delay:0.7s;}
.btn:nth-of-type(4){animation-delay:0.8s;}

.btn:hover{
  transform:scale(1.04);
}

.btn:active{
  transform:scale(0.97);
}

/* BOTÓN PRINCIPAL */
.btn.gold{
  background:#d4af37;
  color:#000;
  border:none;
  box-shadow:0 0 20px rgba(212,175,55,0.5);
}

/* SECCIONES */
.section{
  margin-top:35px;
  text-align:left;
  opacity:0;
  animation:fadeIn 1s ease 0.9s forwards;
}

.section h3{
  color:#d4af37;
  margin-bottom:12px;
  font-size:20px;
}

/* SERVICIOS */
.service{
  background:#161616;
  padding:14px;
  border-radius:14px;
  margin:10px 0;
  border:1px solid #222;
  transition:0.2s;
}

.service:hover{
  border:1px solid #d4af37;
}

/* FOOTER */
.footer{
  margin-top:30px;
  font-size:12px;
  color:#888;
  opacity:0;
  animation:fadeIn 1s ease 1s forwards;
}
</style>
</head>

<body>

<div class="container">

<!-- LOGO -->
<img src="logo.png" class="logo-img">

<!-- FOTO -->
<img src="foto.jpeg" class="foto">

<!-- NOMBRE -->
<div class="name">David Jácome</div>
<div class="role">Gerente de Ingeniería</div>

<!-- BOTONES -->
<a class="btn gold" href="contacto.vcf" download>
  👤 Guardar contacto
</a>

<a class="btn" href="https://wa.me/573143994146">
  💬 WhatsApp
</a>

<a class="btn" href="tel:+573143994146">
  📞 Llamar
</a>

<a class="btn" href="https://integral360.com.co">
  🌐 Sitio web
</a>

<!-- SERVICIOS -->
<div class="section">
<h3>Servicios</h3>

<div class="service">Seguridad y Salud en el Trabajo (SST)</div>
<div class="service">Asesoría Jurídica</div>
<div class="service">Gestión Contable</div>
<div class="service">Recursos Humanos</div>
<div class="service">MIPG</div>
<div class="service">Tecnología y Transformación Digital</div>

</div>

<!-- FOOTER -->
<div class="footer">
Integral360 © 2026
</div>

</div>

</body>
</html>
